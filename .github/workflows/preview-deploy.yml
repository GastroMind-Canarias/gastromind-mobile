name: Expo Preview Deploy

on:
  push:
    branches:
      - develop

jobs:
  update:
    name: Expo Update
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci

      # --environment is required: EAS only injects dashboard variables (e.g. EXPO_PUBLIC_*)
      # into the Metro bundle when this flag matches an environment where those vars exist.
      # Without it, EXPO_PUBLIC_API_URL is undefined in CI and the app fails to reach the API.
      - name: 🚀 Publish Update
        run: >-
          eas update
          --branch development
          --environment development
          --message "${{ github.event.head_commit.message }}"
          --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}